<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SubTrackr — Log in</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0c0e14;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .logo {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 36px;
    }
    .logo span { color: #3b82f6; }
    .logo a { text-decoration: none; color: inherit; }

    .auth-card {
      background: #12141e;
      border: 1px solid #1e2235;
      border-radius: 16px;
      padding: 32px 28px;
    }

    .auth-card h2 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .auth-card .sub {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .tab-row {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid #1e2235;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: #64748b;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: #3b82f6;
      border-bottom-color: #3b82f6;
    }

    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      background: #0c0e14;
      border: 1px solid #262630;
      border-radius: 8px;
      padding: 11px 14px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #3b82f6; }

    .btn-submit {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 6px;
    }
    .btn-submit:hover { background: #2563eb; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      text-align: center;
      color: #334155;
      font-size: 12px;
      margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #1e2235;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .btn-google {
      width: 100%;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #262630;
      border-radius: 10px;
      padding: 11px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-google:hover { background: #334155; }

    .error-msg {
      background: #1c1017;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .success-msg {
      background: #0c1a17;
      border: 1px solid #14532d;
      color: #86efac;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 12px;
      color: #3b82f6;
      text-decoration: none;
      margin-top: -10px;
      margin-bottom: 18px;
    }
    .forgot-link:hover { text-decoration: underline; }

    .back-link {
      display: block;
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin-top: 20px;
      text-decoration: none;
    }
    .back-link:hover { color: #94a3b8; }

    /* Reset password form (hidden by default) */
    #reset-form { display: none; }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="logo"><a href="landing.html">Sub<span>Trackr</span></a></div>

    <!-- Login / Signup Card -->
    <div class="auth-card" id="auth-card">
      <div class="tab-row">
        <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Log in</button>
        <button class="tab-btn" id="tab-signup" onclick="showTab('signup')">Sign up</button>
      </div>

      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" required placeholder="Your password">
        </div>
        <a href="#" class="forgot-link" onclick="showReset(event)">Forgot password?</a>
        <button type="submit" class="btn-submit" id="login-btn">Log in</button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" style="display:none" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label>Full name</label>
          <input type="text" id="signup-name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" required placeholder="Min 6 characters" minlength="6">
        </div>
        <button type="submit" class="btn-submit" id="signup-btn">Create account</button>
      </form>

      <div class="divider">or</div>
      <button class="btn-google" onclick="handleGoogleLogin()">Continue with Google</button>
    </div>

    <!-- Reset Password Card -->
    <div class="auth-card" id="reset-form">
      <h2>Reset password</h2>
      <p class="sub">Enter your email and we'll send a reset link.</p>
      <div class="error-msg" id="reset-error"></div>
      <div class="success-msg" id="reset-success"></div>
      <form onsubmit="handleReset(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reset-email" required placeholder="you@example.com">
        </div>
        <button type="submit" class="btn-submit">Send reset link</button>
      </form>
      <a href="#" class="back-link" onclick="hideReset(event)">Back to login</a>
    </div>

    <a href="landing.html" class="back-link">Back to home</a>
  </div>

  <script>
    // ── Supabase config ──
    // REPLACE these with your Supabase project values
    const SUPABASE_URL = 'https://ycwquunujxvykrlutvfq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljd3F1dW51anh2eWtybHV0dmZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxOTE4NTYsImV4cCI6MjA5Mzc2Nzg1Nn0.Uy2cx5Ma3ISRx_iMbya4wQXB5YBiiQXYW3TbtTonT0U';
    const OWNER_EMAIL  = 'saul@gothaminjury.com';

    const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── Check if already logged in ──
    (async function() {
      const { data: { session } } = await _sb.auth.getSession();
      if (session) window.location.href = 'app.html';
    })();

    // ── Tab switching ──
    function showTab(tab) {
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('success-msg').style.display = 'none';
      if (tab === 'login') {
        document.getElementById('login-form').style.display = '';
        document.getElementById('signup-form').style.display = 'none';
        document.getElementById('tab-login').classList.add('active');
        document.getElementById('tab-signup').classList.remove('active');
      } else {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('signup-form').style.display = '';
        document.getElementById('tab-login').classList.remove('active');
        document.getElementById('tab-signup').classList.add('active');
      }
    }

    // Auto-switch to signup if hash is #signup
    if (window.location.hash === '#signup') showTab('signup');

    // ── Reset password view ──
    function showReset(e) {
      e.preventDefault();
      document.getElementById('auth-card').style.display = 'none';
      document.getElementById('reset-form').style.display = '';
    }
    function hideReset(e) {
      e.preventDefault();
      document.getElementById('auth-card').style.display = '';
      document.getElementById('reset-form').style.display = 'none';
    }

    // ── Error/success display ──
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('success-msg').style.display = 'none';
    }
    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
    }

    // ── Login ──
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      const { data, error } = await _sb.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message);
        btn.disabled = false;
        btn.textContent = 'Log in';
        return;
      }

      window.location.href = 'app.html';
    }

    // ── Signup ──
    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;

      const { data, error } = await _sb.auth.signUp({
        email,
        password,
        options: { data: { full_name: name } }
      });

      if (error) {
        showError(error.message);
        btn.disabled = false;
        btn.textContent = 'Create account';
        return;
      }

      showSuccess('Account created! Check your email to confirm, then log in.');
      btn.disabled = false;
      btn.textContent = 'Create account';
    }

    // ── Google OAuth ──
    async function handleGoogleLogin() {
      const { error } = await _sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/app.html' }
      });
      if (error) showError(error.message);
    }

    // ── Password Reset ──
    async function handleReset(e) {
      e.preventDefault();
      const email = document.getElementById('reset-email').value.trim();
      const { error } = await _sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html'
      });
      if (error) {
        document.getElementById('reset-error').textContent = error.message;
        document.getElementById('reset-error').style.display = 'block';
      } else {
        document.getElementById('reset-success').textContent = 'Reset link sent! Check your inbox.';
        document.getElementById('reset-success').style.display = 'block';
        document.getElementById('reset-error').style.display = 'none';
      }
    }
  </script>

</body>
</html>
